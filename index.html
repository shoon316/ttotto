<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>또또 English - 최종 최적화 버전</title>
    <style>
        :root { --primary-color: #ff7675; --secondary-color: #fab1a0; --bg-color: #fff9f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(255,118,117,0.1); text-align: center; }
        h1 { color: var(--primary-color); margin: 0 0 5px; font-size: 32px; }
        .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
        
        .preset-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-preset { background: #fff; border: 2px solid var(--secondary-color); color: var(--primary-color); padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-preset:hover { background: var(--secondary-color); color: white; }

        textarea { 
            width: 100%; min-height: 100px; height: auto; padding: 15px; border: 2px solid #ffeaa7; 
            border-radius: 12px; font-size: 18px; box-sizing: border-box; margin-bottom: 10px; 
            resize: none; font-family: inherit; line-height: 1.6; overflow: hidden; outline: none;
        }

        #translation-display {
            background: #f0f7ff; color: #4a90e2; padding: 12px; border-radius: 12px;
            font-size: 16px; margin-bottom: 15px; display: none; border-left: 5px solid #4a90e2; text-align: left;
        }

        .btn-translate {
            background: #f1f2f6; color: #555; padding: 6px 16px; border-radius: 15px;
            font-size: 12px; cursor: pointer; border: 1px solid #ddd; margin-bottom: 15px; display: none;
        }
        
        .controls { display: flex; justify-content: space-around; background: #fff5f5; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; gap: 10px; }
        .control-item { display: flex; flex-direction: column; gap: 5px; flex: 1; text-align: left; }
        select { padding: 6px; border-radius: 8px; border: 1px solid #ddd; font-size: 12px; background: white; outline: none; }

        .btn-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; color: white; }
        .btn-listen { background: var(--secondary-color); }
        .btn-speak { background: var(--primary-color); }

        #comparison-display { margin: 20px 0; font-size: 20px; line-height: 1.6; min-height: 35px; text-align: left; background: #fafafa; padding: 15px; border-radius: 10px; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; text-decoration: underline; cursor: pointer; font-weight: bold; }

        .score-badge { font-size: 42px; color: var(--primary-color); font-weight: 800; margin-bottom: 10px; }
        
        .history-item { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; display: flex; justify-content: space-between; cursor: pointer; }
        #status-msg { font-size: 12px; color: #fab1a0; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍎 또또 English</h1>
    <p class="subtitle">미국/영국 정통 발음 학습</p>
    <div id="status-msg">데이터 로드 중...</div>

    <div class="preset-box">
        <button class="btn-preset" onclick="setPreset('daily')">🏠 일상</button>
        <button class="btn-preset" onclick="setPreset('travel')">✈️ 여행</button>
        <button class="btn-preset" onclick="setPreset('golf')">⛳ 골프</button>
        <button class="btn-preset" onclick="setPreset('church')">⛪ 교회</button>
        <button class="btn-preset" onclick="setPreset('random')">🎲 랜덤</button>
    </div>

    <textarea id="textInput" placeholder="문장을 선택해 주세요" onfocus="preventStop(event)" oninput="autoResize()"></textarea>
    
    <div id="translation-display"></div>
    <div class="btn-translate" id="swapBtn" onclick="toggleTranslation()">🔍 번역 보기</div>

    <div class="controls">
        <div class="control-item"> 목소리 <select id="voiceSelect"></select></div>
        <div class="control-item"> 속도: <span id="speedVal">1.0</span> <input type="range" id="speedRange" min="0.5" max="1.5" step="0.1" value="1.0"></div>
    </div>
    
    <div class="btn-box">
        <button class="btn-listen" onclick="playSpeech(document.getElementById('textInput').value)">🎧 전체 듣기</button>
        <button class="btn-speak" onclick="startRecognition()">🎤 발음하기</button>
    </div>

    <div id="result-box">
        <div id="comparison-display"></div>
        <div id="scoreArea" style="display:none;"><div class="score-badge" id="scoreValue">0%</div></div>
    </div>

    <div style="text-align: left; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
        <div style="font-weight: bold; font-size: 14px; margin-bottom: 10px;">🕒 최근 학습</div>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTd4zYF3VWpo3UGriP6LJXXekWTZMHYa7ZLkKSDwe0gg87UXiJ5qZMQlCdCgPwTwhDCXLZ9m6mW7Qci/pub?gid=1367477544&single=true&output=csv"; 
    let presets = { daily: [], travel: [], golf: [], church: [] };
    let currentKor = ""; 
    const textInput = document.getElementById('textInput');

    function autoResize() {
        textInput.style.height = 'auto';
        textInput.style.height = textInput.scrollHeight + 'px';
    }

    function preventStop(e) { if (window.speechSynthesis.speaking) { e.preventDefault(); textInput.blur(); } }

    async function loadOnlineData() {
        try {
            const res = await fetch(SHEET_URL);
            const csv = await res.text();
            csv.split(/\r?\n/).forEach(row => {
                const col = row.split(',');
                if (col.length >= 2 && presets[col[0].trim().toLowerCase()]) {
                    presets[col[0].trim().toLowerCase()].push({ eng: col[1].trim(), kor: col[2]?.trim() || "" });
                }
            });
            document.getElementById('status-msg').innerText = "✅ 데이터 연동 성공";
        } catch (e) { document.getElementById('status-msg').innerText = "❌ 로드 실패"; }
    }

    function setPreset(cat) {
        const keys = Object.keys(presets).filter(k => presets[k].length > 0);
        const list = cat === 'random' ? presets[keys[Math.floor(Math.random()*keys.length)]] : presets[cat];
        if (!list?.length) return;
        
        const item = list[Math.floor(Math.random()*list.length)];
        textInput.value = item.eng;
        currentKor = item.kor;
        
        autoResize();
        document.getElementById('translation-display').style.display = "none";
        document.getElementById('translation-display').innerText = currentKor;
        document.getElementById('swapBtn').style.display = "inline-block";
        document.getElementById('swapBtn').innerText = "🔍 번역 보기";
        clearResult();
    }

    function toggleTranslation() {
        const div = document.getElementById('translation-display');
        const open = div.style.display === "block";
        div.style.display = open ? "none" : "block";
        document.getElementById('swapBtn').innerText = open ? "🔍 번역 보기" : "🙈 번역 닫기";
    }

    function playSpeech(txt) {
        if(!txt) return;
        window.speechSynthesis.cancel();
        setTimeout(() => {
            const m = new SpeechSynthesisUtterance(txt);
            const voices = window.speechSynthesis.getVoices();
            const selectedVoice = voices.find(v => v.name === document.getElementById('voiceSelect').value);
            if(selectedVoice) m.voice = selectedVoice;
            m.rate = document.getElementById('speedRange').value;
            window.speechSynthesis.speak(m);
        }, 50);
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';

    function startRecognition() { 
        if(!textInput.value) return;
        document.getElementById('comparison-display').innerText = "듣고 있습니다..."; 
        recognition.start(); 
    }

    recognition.onresult = (e) => {
        const reco = e.results[0][0].transcript.toLowerCase().replace(/[.,!?]/g,"");
        const orig = textInput.value.trim().split(/\s+/);
        const recoWords = reco.split(/\s+/);
        const display = document.getElementById('comparison-display');
        display.innerHTML = "";
        let matches = 0;

        orig.forEach(word => {
            const clean = word.toLowerCase().replace(/[.,!?]/g,"");
            const span = document.createElement('span');
            span.innerText = word + " ";
            if (recoWords.includes(clean)) { span.className = "correct"; matches++; }
            else { 
                span.className = "wrong"; 
                span.onclick = (ev) => { ev.stopPropagation(); playSpeech(clean); };
            }
            display.appendChild(span);
        });

        const score = Math.round((matches / orig.length) * 100);
        document.getElementById('scoreArea').style.display = "block";
        document.getElementById('scoreValue').innerText = score + "%";
        saveHistory(textInput.value, score);
    };

    function saveHistory(sentence, score) {
        let h = JSON.parse(localStorage.getItem('todoH_new') || '[]');
        h = h.filter(i => i.sentence !== sentence).slice(0, 6);
        h.unshift({ sentence, score });
        localStorage.setItem('todoH_new', JSON.stringify(h));
        updateHistoryDisplay();
    }

    function updateHistoryDisplay() {
        const list = document.getElementById('historyList');
        const h = JSON.parse(localStorage.getItem('todoH_new') || '[]');
        list.innerHTML = h.map(i => `<div class="history-item" onclick="loadH('${i.sentence.replace(/'/g, "\\'")}')"><span>${i.sentence}</span><b>${i.score}%</b></div>`).join('');
    }

    function loadH(s) { textInput.value = s; autoResize(); clearResult(); }
    function clearResult() { document.getElementById('comparison-display').innerHTML = ""; document.getElementById('scoreArea').style.display = "none"; }

    // 목소리 로드 및 한국어 차단 최적화 함수
    function initVoices() {
        const vs = document.getElementById('voiceSelect');
        const allVoices = window.speechSynthesis.getVoices();
        
        // 영어(en)만 필터링 (한국어 ko 완벽 차단)
        const enVoices = allVoices.filter(v => v.lang.startsWith('en'));
        
        if (enVoices.length === 0 || vs.options.length > 0) return;

        enVoices.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.name;
            
            // 제조사 이름 삭제 및 가독성 향상
            let displayName = v.name.replace(/Microsoft |Google |Apple |Samsung /g, "");
            
            // 지역 코드 추출 (US, UK 등)
            const region = v.lang.split('-')[1] ? ` (${v.lang.split('-')[1].toUpperCase()})` : "";
            opt.innerText = displayName + region;
            vs.appendChild(opt);
        });

        // 기본값: 미국 영어(US) 우선 설정
        const defaultVoice = [...vs.options].find(o => o.text.includes('US')) || vs.options[0];
        if (defaultVoice) vs.value = defaultVoice.value;
    }

    // 브라우저 호환성 대응 (Voice 로딩)
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = initVoices;
    }

    window.onload = () => { 
        loadOnlineData(); 
        initVoices(); 
        updateHistoryDisplay(); 
        autoResize(); 
        // 모바일 및 특정 브라우저 지연 로드 대응
        setTimeout(initVoices, 600);
    };
    
    document.getElementById('speedRange').oninput = (e) => document.getElementById('speedVal').innerText = e.target.value;
</script>
</body>
</html>
